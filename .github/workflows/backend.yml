name: backend

on:
  push:
    branches: [ "master" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'backend/**'

env:
  REGISTRY: crpi-4z8h6zhc9e28drvr.ap-southeast-1.personal.cr.aliyuncs.com/images_d
  IMAGE_NAME: auto-deploy-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Get current date
      id: date
      run: echo "CURRENT_DATE=$(TZ='Asia/Shanghai' date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

    - name: Login to Aliyun Container Registry
      uses: docker/login-action@v3
      with:
        registry: crpi-4z8h6zhc9e28drvr.ap-southeast-1.personal.cr.aliyuncs.com
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.CURRENT_DATE }}
        labels: |
          version=${{ github.sha }}
          build-date=${{ env.CURRENT_DATE }}

    - name: Notify Backend
      if: success()
      run: |
        curl -s -X POST "${{ secrets.DEPLOY_API_URL }}/api/notify" \
          -H "Content-Type: application/json" \
          -d '{
            "version": "${{ env.CURRENT_DATE }}",
            "address": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.CURRENT_DATE }}",
            "md5": "${{ steps.build.outputs.digest }}",
            "name": "${{ env.IMAGE_NAME }}",
            "service_id": ${{ secrets.BACKEND_SERVICE_ID }}
          }'
