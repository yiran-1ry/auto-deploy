name: backend

on:
  push:
    branches: [ "master" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'backend/**'

env:
  REGISTRY: registry.ap-southeast-1.aliyuncs.com/images_d
  IMAGE_NAME: auto-deploy-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Get current date
      id: date
      run: echo "CURRENT_DATE=$(TZ='Asia/Shanghai' date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

    - name: Login to Aliyun Container Registry
      uses: docker/login-action@v3
      with:
        registry: registry.ap-southeast-1.aliyuncs.com
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.CURRENT_DATE }}
        labels: |
          version=${{ github.sha }}
          build-date=${{ env.CURRENT_DATE }}

    - name: Build Status
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo "Build succeeded at ${{ env.CURRENT_DATE }}"
        else
          echo "Build failed at ${{ env.CURRENT_DATE }}"
        fi
